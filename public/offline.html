<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>VOLOO — Offline</title>
  <style>
    /* ── RULED tokens (spec §1.1) — self-contained, no network fonts ────── */
    :root {
      --bg:     #0A0A0A;
      --raise:  #111110;
      --ink:    #F4F3F0;
      --mut:    rgba(244, 243, 240, 0.62);
      --faint:  rgba(244, 243, 240, 0.34);
      --line:   rgba(244, 243, 240, 0.14);
      --accent: #D8FF3A;
      --accent-ink: #1A2000;
      --font-display: "Space Grotesk", system-ui, -apple-system, "Segoe UI", sans-serif;
      --font-mono: ui-monospace, "SF Mono", "Cascadia Mono", "Segoe UI Mono", Menlo, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    ::selection { background: var(--accent); color: var(--accent-ink); }

    html, body { background: var(--bg); }

    body {
      color: var(--ink);
      font-family: var(--font-display);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: calc(env(safe-area-inset-top, 0px) + 24px)
               calc(env(safe-area-inset-right, 0px) + 20px)
               calc(env(safe-area-inset-bottom, 0px) + 24px)
               calc(env(safe-area-inset-left, 0px) + 20px);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Mono voice ─────────────────────────────────────────────────────── */
    .mono {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      line-height: 1.4;
      text-transform: uppercase;
      color: var(--faint);
    }
    .micro {
      font-family: var(--font-mono);
      font-size: 0.625rem;
      letter-spacing: 0.08em;
      line-height: 1.3;
      text-transform: uppercase;
      color: var(--faint);
    }

    /* ── Crosshair frame (spec §2.1.4) ──────────────────────────────────── */
    .xframe {
      position: relative;
      width: 100%;
      max-width: 440px;
      animation: rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .tick {
      position: absolute;
      width: 12px;
      height: 12px;
      color: var(--faint);
      pointer-events: none;
    }
    .tick::before, .tick::after { content: ""; position: absolute; background: currentColor; }
    .tick::before { width: 12px; height: 1px; }
    .tick::after  { width: 1px;  height: 12px; }
    .tick.tl { top: -6px; left: -6px; }
    .tick.tr { top: -6px; right: -6px; }
    .tick.bl { bottom: -6px; left: -6px; }
    .tick.br { bottom: -6px; right: -6px; }
    .tick.tr::before, .tick.tr::after { right: 0; }
    .tick.bl::before, .tick.bl::after { bottom: 0; }
    .tick.br::before { right: 0; bottom: 0; }
    .tick.br::after  { right: 0; bottom: 0; }

    .card {
      background: var(--raise);
      border: 1px solid var(--line);
      border-radius: 2px;
      padding: 28px;
    }

    /* ── Header lockup: index row → rule ────────────────────────────────── */
    .shead {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 12px;
    }
    .rule {
      height: 1px;
      background: var(--line);
      margin-bottom: 24px;
    }

    h1 {
      font-size: clamp(1.9rem, 8vw, 2.6rem);
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 1.04;
      text-wrap: balance;
      margin-bottom: 12px;
    }
    h1 .a { color: var(--accent); }

    .lead {
      color: var(--mut);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    /* ── Status row — pulsing dot + mono label ──────────────────────────── */
    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.6s ease-in-out infinite;
      flex: none;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1);   opacity: 1; }
      50%      { transform: scale(1.4); opacity: 0.4; }
    }

    .btn {
      display: block;
      width: 100%;
      background: var(--accent);
      color: var(--accent-ink);
      border: none;
      border-radius: 2px;
      padding: 14px 24px;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.3s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.97); transition: transform 0.12s; }

    /* ── Footer data-ornament ───────────────────────────────────────────── */
    .foot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-top: 32px;
      text-align: center;
      animation: rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.15s both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .xframe, .foot { animation: none; }
      .dot { animation: none; }
      .btn:active { transform: none; }
    }
  </style>
</head>
<body>
  <div class="xframe">
    <i class="tick tl"></i><i class="tick tr"></i><i class="tick bl"></i><i class="tick br"></i>
    <div class="card">
      <div class="shead">
        <span class="mono">VOLOO — Offline</span>
        <span class="mono">( No signal )</span>
      </div>
      <div class="rule"></div>

      <h1>Connection <span class="a">lost.</span></h1>
      <p class="lead">The menu needs a network to stay fresh. Check your connection — we&rsquo;ll reload the moment it returns.</p>

      <div class="status" aria-live="polite">
        <span class="dot" aria-hidden="true"></span>
        <span class="micro" id="status-label">Awaiting network &hellip;</span>
      </div>

      <button class="btn" onclick="window.location.reload()">Try again</button>
    </div>
  </div>

  <div class="foot">
    <p class="micro">41.7151&deg; N &middot; 44.8271&deg; E &mdash; TBILISI</p>
    <p class="micro">&copy; SHEMOQMEDI &mdash; MADE WITH &#10084; IN TBILISI</p>
  </div>

  <script>
    // Auto-recover: reload as soon as the connection comes back.
    window.addEventListener("online", function () {
      var label = document.getElementById("status-label");
      if (label) label.textContent = "Signal found — reloading";
      setTimeout(function () { window.location.reload(); }, 400);
    });
  </script>
</body>
</html>
